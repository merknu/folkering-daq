# Folkering DAQ — Docker Compose
#
# Build + run in QEMU aarch64 inside Docker
# Usage:
#   docker compose up           # Build and run with serial output
#   docker compose run daq      # Interactive session
#   docker compose build        # Just build

services:
  daq:
    build:
      context: .
      dockerfile: Dockerfile.dev
    privileged: true    # Needed for QEMU KVM acceleration
    stdin_open: true
    tty: true
    ports:
      - "7420:7420"     # openDAQ Native Streaming
      - "5353:5353/udp" # mDNS
